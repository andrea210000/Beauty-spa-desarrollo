<p-toast></p-toast>
<div class="p-[0.5vw] pl-[1.5vw] pr-[1.5vw] font-[Nunito Sans] h-screen w-full justify-center items-center flex"
    style="background-image: url(assets/images/schedule-background.jpg); background-size: cover">
    <div
        class="flex items-center justify-center bg-[var(--white-beauty)] rounded-[1vw] w-[35vw] py-[2vw] px-[1vw] flex-col gap-[0.8vw]">
        <div class="flex items-center justify-start w-full">
            <h1 class="font-semibold text-[1.5vw] font-['Nunito Sans'] text-left pl-[2vw]">Crear cuenta</h1>
        </div>
        <div class="flex items-center justify-start w-full">
            <h2 class="font-normal text-[0.9vw] font-['Nunito Sans'] text-left pl-[2vw] text-[#ff69b4]">Unete a nuestra comunidad y comienza tu viaje de bienestar</h2>
        </div>

        <div class="flex items-center justify-start w-full flex-col gap-[0.8vw]">
            <div class="flex w-[90%] gap-[1vw]">
                <div class="w-1/2">
                    <label for="nombres" class="w-full pl-[0.5vw] font-['Nunito Sans'] font-semibold text-[0.85vw]">Nombres</label>
                    <div class="w-full justify-start items-center relative mt-[0.3vw]">
                        <input type="text" id="nombres" [(ngModel)]="nombres" name="nombres" placeholder="Nombres"
                            class="border border-[#f3a1c4] rounded-[0.5vw] w-full p-[0.5vw] pl-[2vw] outline-none text-[0.85vw]">
                        <i class="pi pi-user absolute left-[0.5vw] top-[50%] transform -translate-y-1/2 text-[#f3a1c4] text-[0.9vw]"></i>
                    </div>
                </div>
                <div class="w-1/2">
                    <label for="apellidos" class="w-full pl-[0.5vw] font-['Nunito Sans'] font-semibold text-[0.85vw]">Apellidos</label>
                    <div class="w-full justify-start items-center relative mt-[0.3vw]">
                        <input type="text" id="apellidos" [(ngModel)]="apellidos" name="apellidos" placeholder="Apellidos"
                            class="border border-[#f3a1c4] rounded-[0.5vw] w-full p-[0.5vw] pl-[2vw] outline-none text-[0.85vw]">
                        <i class="pi pi-user absolute left-[0.5vw] top-[50%] transform -translate-y-1/2 text-[#f3a1c4] text-[0.9vw]"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-start w-full flex-col gap-[0.8vw]">
            <div class="w-[90%]">
                <label for="email" class="w-full pl-[0.5vw] font-['Nunito Sans'] font-semibold text-[0.85vw]">Correo electrónico</label>
                <div class="w-full justify-start items-center relative mt-[0.3vw]">
                    <input type="email" id="email" [(ngModel)]="correo" name="correo" placeholder="tu@email.com"
                        class="border border-[#f3a1c4] rounded-[0.5vw] w-full p-[0.5vw] pl-[2vw] outline-none text-[0.85vw]">
                    <i class="pi pi-envelope absolute left-[0.5vw] top-[50%] transform -translate-y-1/2 text-[#f3a1c4] text-[0.9vw]"></i>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-start w-full flex-col gap-[0.8vw]">
            <div class="w-[90%]">
                <label for="telefono" class="w-full pl-[0.5vw] font-['Nunito Sans'] font-semibold text-[0.85vw]">Teléfono</label>
                <div class="w-full justify-start items-center relative mt-[0.3vw]">
                    <input type="tel" id="telefono" [(ngModel)]="telefono" name="telefono" placeholder="1234567890"
                        class="border border-[#f3a1c4] rounded-[0.5vw] w-full p-[0.5vw] pl-[2vw] outline-none text-[0.85vw]">
                    <i class="pi pi-phone absolute left-[0.5vw] top-[50%] transform -translate-y-1/2 text-[#f3a1c4] text-[0.9vw]"></i>
                </div>
            </div>
        </div>

        <div class="flex w-[90%] gap-[1vw]">
            <div class="w-1/3">
                <label for="tipoId" class="w-full pl-[0.5vw] font-['Nunito Sans'] font-semibold text-[0.85vw]">Tipo ID</label>
                <div class="w-full justify-start items-center relative mt-[0.3vw]">
                    <select id="tipoId" [(ngModel)]="tipoIdentificacion" name="tipoIdentificacion"
                        class="border border-[#f3a1c4] rounded-[0.5vw] w-full p-[0.5vw] pl-[2vw] outline-none text-[0.85vw] bg-white appearance-none cursor-pointer">
                        <option *ngFor="let t of tiposIdentificacion" [value]="t.value">{{ t.label }}</option>
                    </select>
                    <i class="pi pi-id-card absolute left-[0.5vw] top-[50%] transform -translate-y-1/2 text-[#f3a1c4] text-[0.9vw]"></i>
                </div>
            </div>
            <div class="w-2/3">
                <label for="numeroId" class="w-full pl-[0.5vw] font-['Nunito Sans'] font-semibold text-[0.85vw]">Número de Identificación</label>
                <div class="w-full justify-start items-center relative mt-[0.3vw]">
                    <input type="text" id="numeroId" [(ngModel)]="numeroIdentificacion" name="numeroIdentificacion" placeholder="1234567890"
                        class="border border-[#f3a1c4] rounded-[0.5vw] w-full p-[0.5vw] pl-[2vw] outline-none text-[0.85vw]">
                    <i class="pi pi-id-card absolute left-[0.5vw] top-[50%] transform -translate-y-1/2 text-[#f3a1c4] text-[0.9vw]"></i>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-start w-full flex-col gap-[0.8vw]">
            <div class="w-[90%]">
                <label for="password" class="w-full pl-[0.5vw] font-['Nunito Sans'] font-semibold text-[0.85vw]">Contraseña</label>
                <div class="w-full justify-start items-center relative mt-[0.3vw]">
                    <input [type]="mostrarPassword ? 'text' : 'password'" id="password" [(ngModel)]="contrasena" name="contrasena" placeholder="********"
                        class="border border-[#f3a1c4] rounded-[0.5vw] w-full p-[0.5vw] pl-[2vw] outline-none text-[0.85vw]">
                    <i class="pi pi-lock absolute left-[0.5vw] top-[50%] transform -translate-y-1/2 text-[#f3a1c4] text-[0.9vw]"></i>
                    <i *ngIf="!mostrarPassword" (click)="toggleMostrar()"
                        class="pi pi-eye absolute right-[0.5vw] top-[50%] transform -translate-y-1/2 text-[#f3a1c4] text-[0.9vw] cursor-pointer"></i>
                    <i *ngIf="mostrarPassword" (click)="toggleMostrar()"
                        class="pi pi-eye-slash absolute right-[0.5vw] top-[50%] transform -translate-y-1/2 text-[#f3a1c4] text-[0.9vw] cursor-pointer"></i>
                </div>
            </div>
        </div>

        <div class="w-[90%] flex items-center justify-center">
            <button (click)="onSubmit()"
                class="bg-[#ff69b4] w-full h-[2.5vw] text-[#ffffff] rounded-[1.3vw] cursor-pointer font-bold text-[0.9vw] hover:bg-[#f3a1c4] transition-colors transform hover:text-[black]">
                Crear cuenta
            </button>
        </div>

        <div class="w-full justify-center items-center pt-[0.5vw]">
            <h2 class="text-center font-['Nunito Sans'] text-[0.9vw]">O continua con</h2>
        </div>

        <div class="justify-center items-center flex w-full">
            <button class="flex items-center justify-center gap-[0.8vw] bg-[#ffffff] border border-gray-300 rounded-[0.5vw] w-[25vw] h-[2.5vw] text-[#3c4043] cursor-pointer text-[0.9vw] hover:bg-gray-100 hover:border-gray-400 transition-colors shadow-sm">
                <i class="pi pi-google text-[1.2vw]"></i>
                <span class="font-medium">Continuar con Google</span>
            </button>
        </div>

        <div class="w-full justify-center items-center pt-[0.5vw] flex gap-[0.5vw]">
            <span class="text-[0.9vw] text-[#ff69b4]">¿Ya tienes una cuenta?</span>
            <span class="text-[0.9vw] text-[#ff69b4] hover:underline cursor-pointer" (click)="navigateTo('login')">
                Inicia sesión
            </span>
        </div>
    </div>
</div>
